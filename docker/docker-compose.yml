version: '3.8'

services:
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./interview_copilot.db
      - SECRET_KEY=supersecretjwtkeyforlocaldevelopment1234567890!@#$
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - OPENAI_API_KEY=
    volumes:
      - backend-db:/app
    networks:
      - copilot-network

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - copilot-network

volumes:
  backend-db:

networks:
  copilot-network:
    driver: bridge
